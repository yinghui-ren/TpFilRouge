<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Programmer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Edit Programmer</h2>
<form th:action="@{/programmers/update}" th:object="${programmer}" method="post">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" th:field="*{name}">
    </div>
    <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" th:field="*{firstName}">
    </div>
    <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" class="form-control" th:field="*{address}">
    </div>
    <div class="mb-3">
        <label class="form-label">Favorite Language</label>
        <input type="text" class="form-control" th:field="*{favoriteLanguage}">
    </div>
    <div class="mb-3">
        <label class="form-label">Favorite Book</label>
        <input type="text" class="form-control" th:field="*{favoriteBook}">
    </div>
    <div class="mb-3">
        <label class="form-label">Salary</label>
        <input type="number" class="form-control" th:field="*{salary}">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/programmers/list}" class="btn btn-secondary">Cancel</a>
    </div>

</form>
</body>
</html>
