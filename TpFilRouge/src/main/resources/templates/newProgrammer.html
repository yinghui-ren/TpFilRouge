<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Programmer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">

    <h2 class="mb-4 text-center">Add Programmer</h2>

    <form th:action="@{/programmers/add}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <input type="text" name="name" class="form-control" placeholder="Name">
        </div>

        <div class="mb-3">
            <input type="text" name="firstName" class="form-control" placeholder="First Name">
        </div>

        <div class="mb-3">
            <input type="text" name="address" class="form-control" placeholder="Address">
        </div>

        <div class="mb-3">
            <input type="text" name="favoriteLanguage" class="form-control" placeholder="Favorite Language">
        </div>

        <div class="mb-3">
            <input type="text" name="favoriteBook" class="form-control" placeholder="Favorite Book">
        </div>

        <div class="mb-3">
            <input type="number" name="salary" class="form-control" placeholder="Salary">
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">Add</button>
            <a th:href="@{/programmers/list}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
